name: PHPCBF autofix (temporary)

# Manually dispatched. Runs phpcbf to auto-fix WPCS violations, then captures
# what remains. Uploads a git patch + reports as artifacts so the fix can be
# applied locally. Delete this file once the theme passes lint.

on:
  push:
    branches: [ fix/phpcs-allow-plugin ]
  workflow_dispatch:

env:
  THEME_DIR: wp-content/themes/eateggs

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install PHPCS + WordPress Coding Standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs:^3 \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Report BEFORE
        run: phpcs --report=summary || true

      - name: Run phpcbf (autofix)
        run: phpcbf || true

      - name: Report AFTER (summary)
        run: phpcs --report=summary --report-file=phpcs-after-summary.txt || true

      - name: Report AFTER (full)
        run: phpcs --report=full --report-file=phpcs-after-full.txt || true

      - name: Show remaining
        run: cat phpcs-after-summary.txt || true

      - name: Build patch
        run: git diff -- "$THEME_DIR" > autofix.patch || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phpcbf-output
          path: |
            autofix.patch
            phpcs-after-summary.txt
            phpcs-after-full.txt
