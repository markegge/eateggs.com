name: CI / Deploy

# PRs are linted. Pushes to main deploy to production after a manual approval
# (configured via the "production" GitHub Environment — see DEPLOY.md).
# Production is reached over a Cloudflare Tunnel (ssh.eateggs.com), so no origin
# IP is ever exposed and port 22 stays closed to the internet.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  THEME_DIR: wp-content/themes/eateggs

jobs:
  lint:
    name: Lint (php -l + PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer, cs2pr
          coverage: none

      - name: PHP syntax check (php -l)
        run: |
          set -e
          find "$THEME_DIR" -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Install PHPCS + WordPress Coding Standards
        run: |
          # WPCS 3 pulls in the phpcodesniffer-composer-installer plugin, which
          # modern Composer blocks unless explicitly allowed.
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs:^3 \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS
        run: phpcs -q --report=checkstyle | cs2pr

  deploy-production:
    name: Deploy to production
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # The "production" environment requires a manual approval (a required
    # reviewer) so a merge never reaches the live site unattended.
    environment:
      name: production
      url: https://www.eateggs.com
    steps:
      - uses: actions/checkout@v5

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared
          cloudflared --version

      - name: Set up SSH over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          # Only needed if ssh.eateggs.com sits behind a Cloudflare Access policy.
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          proxy="cloudflared access ssh --hostname %h"
          if [ -n "$CF_ACCESS_CLIENT_ID" ]; then
            proxy="$proxy --service-token-id $CF_ACCESS_CLIENT_ID --service-token-secret $CF_ACCESS_CLIENT_SECRET"
          fi
          {
            echo "Host $PROD_HOST"
            echo "  User $PROD_USER"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  ProxyCommand $proxy"
            echo "  StrictHostKeyChecking accept-new"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config

      - name: Back up current theme on server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          ssh "$PROD_HOST" \
            "cp -a '$PROD_PATH' '$PROD_PATH.bak-$(date +%Y%m%d%H%M%S)' || true"

      - name: Rsync theme to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.git*' --exclude='node_modules' --exclude='vendor' \
            -e ssh \
            "$THEME_DIR/" \
            "$PROD_HOST:$PROD_PATH/"

      - name: Flush cache (best effort)
        continue-on-error: true
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_WP_PATH: ${{ secrets.PROD_WP_PATH }}
        run: |
          ssh "$PROD_HOST" \
            "wp cache flush --path=$PROD_WP_PATH || true"
